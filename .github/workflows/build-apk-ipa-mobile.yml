name: APK Build with PyArmor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_NUMBER: 2
  BUILD_VERSION: 1.2.0
  PYTHON_VERSION: 3.9.21  # ¡Importante! Usar versión específica
  FLET_CLI_VERSION: 0.28.3

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install flet-cli==${{ env.FLET_CLI_VERSION }}
        pip install pyarmor
    
    - name: Obfuscate with PyArmor (NO RUNTIME)
      run: |
        echo "🔐 Ofuscando código SIN runtime específico..."
        
        # Backup
        cp -r src src_original
        
        # Ofuscar SIN runtime (--no-runtime es clave!)
        pyarmor generate --recursive \
          --no-runtime \
          --output src_ofuscado \
          src/
        
        # Reemplazar
        rm -rf src
        mv src_ofuscado src
        
        # Verificar que NO hay pyarmor_runtime_*
        echo "✅ Verificando:"
        ls -la src/
    
    - name: Build APK
      run: |
        flet build apk --verbose \
          --build-number=${{ env.BUILD_NUMBER }} \
          --build-version=${{ env.BUILD_VERSION }}
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-build
        path: build/apk
